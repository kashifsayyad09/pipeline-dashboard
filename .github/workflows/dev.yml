name: Deploy Streamlit Dashboard

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533267120119:role/OIDC-ROLE
          aws-region: us-east-1

      - name: Deploy to Private EC2 using SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-004e985e0bab8c1bf" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Streamlit Dashboard" \
            --parameters 'commands=[
              "sudo dnf install -y git python3 python3-pip",

              "mkdir -p /home/ec2-user",

              "if [ ! -d /home/ec2-user/github-actions-dashboard ]; then \
                 git clone https://github.com/${{ github.repository }}.git /home/ec2-user/github-actions-dashboard; \
               fi",

              "cd /home/ec2-user/github-actions-dashboard",

              "git fetch origin",

              "git reset --hard origin/main",

              "mv .env.example .env",

              "cat > .env <<EOF\nGITHUB_TOKEN=${{ secrets.TOKEN_APP }}\nGITHUB_API_URL=${{ secrets.API_URL }}\nEOF",

              "python3 -m pip install --upgrade pip",

              "python3 -m pip install -r requirements.txt",

              "pkill -f streamlit || true",

              "nohup streamlit run app.py --server.address=0.0.0.0 --server.port=8501 > streamlit.log 2>&1 &"
            ]'
