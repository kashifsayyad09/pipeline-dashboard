name: Deploy Streamlit Dashboard

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533267120119:role/OIDC-ROLE
          aws-region: us-east-1

      - name: Deploy to Private EC2 using SSM
        run: |
         COMMAND_ID=$(aws ssm send-command \
          --instance-ids i-004e985e0bab8c1bf \
          --document-name AWS-RunShellScript \
          --parameters 'commands=[
           "pwd",
           "whoami",
           "hostname",
           "mkdir -p /home/ec2-user/test",
           "echo hello > /home/ec2-user/test/file.txt",
           "ls -la /home/ec2-user/test"
            ]' \
          --query "Command.CommandId" \
          --output text)

          echo "Command ID: $COMMAND_ID"

         aws ssm wait command-executed \
         --command-id "$COMMAND_ID" \
         --instance-id i-004e985e0bab8c1bf

         aws ssm get-command-invocation \
         --command-id "$COMMAND_ID" \
         --instance-id i-004e985e0bab8c1bf
