name: Deploy Streamlit Dashboard

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533267120119:role/OIDC-ROLE
          aws-region: us-east-1

      - name: Deploy to Private EC2 using SSM
        shell: bash
        run: |

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-004e985e0bab8c1bf" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Streamlit Dashboard" \
            --parameters 'commands=[
              "set -e",

              "echo ==== Installing Packages ====",
              "sudo dnf install -y git python3 python3-pip",

              "echo ==== Creating Project Directory ====",
              "mkdir -p /home/ec2-user",

              "echo ==== Clone Repository (First Time Only) ====",
              "if [ ! -d /home/ec2-user/dashboard/.git ]; then git clone https://${{ secrets.GITHUB_TOKEN_APP }}@github.com/kashifsayyad09/pipeline-dashboard.git /home/ec2-user/dashboard; fi",

              "echo ==== Updating Repository ====",
              "cd /home/ec2-user/dashboard",
              "git reset --hard",
              "git clean -fd",
              "git pull origin main",

              "echo ==== Creating .env ====",
              "cp -f .env.example .env || touch .env",

              "grep -q '^GITHUB_TOKEN=' .env && sed -i 's|^GITHUB_TOKEN=.*|GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN_APP }}|' .env || echo 'GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN_APP }}' >> .env",

              "grep -q '^GITHUB_API_URL=' .env && sed -i 's|^GITHUB_API_URL=.*|GITHUB_API_URL=${{ secrets.GITHUB_API_URL }}|' .env || echo 'GITHUB_API_URL=${{ secrets.GITHUB_API_URL }}' >> .env",

              "echo ==== Installing Python Dependencies ====",
              "python3 -m pip install -r requirements.txt",

              "echo ==== Stopping Existing Streamlit ====",
              "pkill -f streamlit || true",

              "echo ==== Starting Streamlit ====",
              "nohup streamlit run app.py --server.address 0.0.0.0 --server.port 8501 > streamlit.log 2>&1 &",

              "sleep 15",

              "echo ==== Streamlit Log ====",
              "cat streamlit.log || true",

              "echo ==== Running Process ====",
              "pgrep -af streamlit || true"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          set +e

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-004e985e0bab8c1bf"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-004e985e0bab8c1bf" \
            --output json

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-004e985e0bab8c1bf" \
            --query "Status" \
            --output text)

          echo "Deployment Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment failed."
            exit 1
          fi

      - name: Deployment Complete
        run: echo "✅ Streamlit Dashboard deployed successfully."
